<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>2.5秒進度條獨立測試</title>
  <style>
    body { background-color: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1); }
    #progress-bar { height: 100%; background: #3498db; width: 100%; box-shadow: 0 0 10px #3498db; }
    button { padding: 15px 30px; font-size: 1.2rem; background: #2ecc71; border: none; border-radius: 8px; color: white; cursor: pointer; margin-top: 40px; }
  </style>
</head>
<body>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <h1>進度條測試</h1>
  <p>觀察上方的藍色橫條，它將在精準的 2.5 秒內縮減至 0。</p>
  
  <button onclick="startTimer()">點我觸發 2.5 秒計時</button>

  <script>
    function startTimer() {
      const pb = document.getElementById('progress-bar');
      // 先重置進度條
      pb.style.transition = 'none';
      pb.style.width = '100%';
      
      // 給予瀏覽器極短暫的重繪時間後，套用動畫
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          pb.style.transition = 'width 2.5s linear';
          pb.style.width = '0%';
        });
      });
    }
  </script>
</body>
</html>
